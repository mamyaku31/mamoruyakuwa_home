<!DOCTYPE html>
<html>
  <head>
<meta charset="UTF-8">
<title>産出実験のデモ</title>

<script src="https://unpkg.com/jspsych@7.3.2"></script>

<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-browser-check@1.0.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>

<script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.2"></script>

<script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>


<link href="https://unpkg.com/jspsych@7.3.2/css/jspsych.css" rel="stylesheet"/>
</head>
  <body></body>
  <script>
// jsPsych を初期化
const jsPsych = initJsPsych({
  show_progress_bar: true,
  message_progress_bar: "実験終了まで:",
  auto_update_progress_bar: true,
  on_finish: function() {
    window.location = "https://google.com"
  }
});

const welcome = {
  type: jsPsychHtmlButtonResponse,
  prompt: "<p>実験に参加いただきありがとうございます。</p>",
  stimulus: "",
  choices: ['次へ進む'],
};

const initialize_mic = {
  type: jsPsychInitializeMicrophone,
  device_select_message: 'これは被験者にマイクを許可してもらうための試行です。<br>\
「マイクを許可してください」というメッセージが表示された場合は許可してください。',
  button_label: '次へ'
};



const goodbye = {
  type: jsPsychHtmlButtonResponse,
  prompt: "<p>実験に協力いただきありがとうございました。</p>",　
  stimulus: "",
  choices: ['実験を終了する'],
};



// Timeline
const timeline = [
  welcome,
  goodbye,
];

// Run the experiment
jsPsych.run(timeline);
  </script>
</html>
